# opencode.yaml – configuração do workspace OpenCode

# -----------------------------------------------------------------
# Modelo padrão usado quando nenhum modelo é especificado explicitamente
# -----------------------------------------------------------------
model: gpt-oss:120b-cloud   # <-- padrão (OpenAI/Ollama cloud)

# -----------------------------------------------------------------
# Lista opcional de modelos Ollama que já foram puxados para sua máquina.
# Não é obrigatório, mas facilita a consulta e evita digitações erradas.
# -----------------------------------------------------------------
ollama_models:
  # 8 B LLaMA 3 (recomendado para geração geral de texto)
  - name: llama3
    tag: 8b
    reference: ollama/llama3:8b

  # 2 B Gemma (mais leve, rápido)
  - name: gemma
    tag: 2b
    reference: ollama/gemma:2b

  # 7 B Mistral (bom para instruções curtas)
  - name: mistral
    tag: 7b
    reference: ollama/mistral:7b

  # 7 B Phi (bom para raciocínio lógico)
  - name: phi
    tag: 3b
    reference: ollama/phi:3b

  # 7 B LLaVA (modelo com visão, se precisar de imagens)
  - name: llava
    tag: 7b
    reference: ollama/llava:7b

  # 3 B Qwen (alternativa chinesa de código aberto)
  - name: qwen
    tag: 3b
    reference: ollama/qwen:3b

# -----------------------------------------------------------------
# Caso queira sobrescrever o modelo padrão em algum comando, use:
#   opencode run --model <reference> "sua mensagem"
# Ex.:  opencode run --model ollama/llama3:8b "Explique a tectônica de placas"
# -----------------------------------------------------------------
