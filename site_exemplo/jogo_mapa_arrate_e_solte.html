<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Geografia para o ENEM: Jogo de Industrialização</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-styles">
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 0;
    }

    .glow-green {
      box-shadow: 0 0 20px 5px rgba(0, 255, 0, 0.4);
    }

    .glow-red {
      box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.4);
    }
    
    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .pin-marker {
      width: 40px;
      height: 48px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center bottom;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 8px;
      border: 3px solid white;
      border-radius: 50%;
      background-color: transparent;
    }

    .pin-empty .pin-marker {
      background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%232A8855" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 36" xmlns="http://www.w3.org/2000/svg"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" fill="%232A8855"></path><circle cx="12" cy="10" fill="white" r="4"></circle></svg>');
      border-color: transparent;
    }
    
    .pin-correct .pin-marker {
      background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%2322C55E" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 36" xmlns="http://www.w3.org/2000/svg"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" fill="%2322C55E"></path><circle cx="12" cy="10" fill="white" r="5"></circle><path d="M9 10l2 2 4-4" stroke="%2322C55E" stroke-width="2"></path></svg>');
    }

    .pin-incorrect .pin-marker {
      background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%23EF4444" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 36" xmlns="http://www.w3.org/2000/svg"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" fill="%23EF4444"></path><circle cx="12" cy="10" fill="white" r="5"></circle><path d="M10 8l4 4m0-4l-4 4" stroke="%23EF4444" stroke-width="2"></path></svg>');
    }

    .pin-label {
      background: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      margin-top: 4px;
      border: 1px solid #e5e7eb;
      white-space: nowrap;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#2A8855',
              dark: '#1e6640',
              light: '#dcfce7',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">
<!-- BEGIN: HeaderSection -->
<header class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-50">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<div class="text-[#2A8855] font-bold text-xl md:text-2xl">
        Geografia para o ENEM: Jogo de Industrialização
      </div>
<div class="flex flex-col items-center min-w-[200px]">
<div class="flex justify-start w-full text-sm mb-1">
<span class="text-black">Regiões Corretas: <span class="font-bold">2/8</span></span>
</div>
<div class="w-full bg-[#dcfce7] rounded-full h-2">
<div class="bg-[#2A8855] h-2 rounded-full" style="width: 25%"></div>
</div>
</div>
<div class="text-black text-lg">
        Tempo Restante: <span class="font-bold">10:45</span>
</div>
</div>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: MainContent -->
<main class="flex-grow w-full h-full flex flex-col items-center justify-center p-0 m-0 relative overflow-hidden">
<!-- Map Area -->
<div class="map-container flex-grow flex items-center justify-center">
<!-- We use the provided image as the map background -->
<img alt="World Map" class="w-full h-auto object-contain opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4iGd-qguGQaVyxIlSDMB2PgOMIo29WAOpL9AwpNQkjyTpuwvzNgqPyOu5H9bS02qn3MO6t_I4mafgyrIRukMLzLE28PRAp93jBZvC3KTSSVCpwojZmkA2FHPf50dT4Kk6H2PP8mRLJp9iQdmahF2bCtQfUjblOqg6TV_PN6E5awf2AtqL1d-xlYFateVTx2TzNjyC9gsFRGK5dB6yfWWCeIVjLjeRDG82RpGw_xXbefPrEOp0hMnilRqa2EKHahbBaLGqQ06q3xT6"/>
<!-- Pins Overlay -->
<!-- Note: Positioning is approximate based on visual center of the map image -->
<div class="absolute inset-0">
<!-- Silicon Valley (Correct) -->
<div class="pin pin-correct" style="top: 38%; left: 19%;">
<div class="pin-marker glow-green rounded-full"></div>
<div class="pin-label glow-green text-green-700 border-green-600 bg-white border-2">Vale do Silício</div>
</div>
<!-- Ruhr (Incorrect - Placed in Brazil for the error state) -->
<div class="pin pin-incorrect" style="top: 65%; left: 36%;">
<div class="pin-marker glow-red rounded-full"></div>
<div class="pin-label glow-red text-red-700 border-red-600 bg-white border-2">Ruhr</div>
</div>
<!-- Empty Pins -->
<!-- Germany/Europe -->
<div class="pin pin-empty" style="top: 30%; left: 49%;">
<div class="pin-marker"></div>
</div>
<!-- Italy/Lombardia -->
<div class="pin pin-empty" style="top: 35%; left: 51%;">
<div class="pin-marker"></div>
</div>
<!-- India/Mumbai -->
<div class="pin pin-empty" style="top: 48%; left: 65%;">
<div class="pin-marker"></div>
</div>
<!-- China/Pearl River Delta -->
<div class="pin pin-empty" style="top: 46%; left: 74%;">
<div class="pin-marker"></div>
</div>
<!-- Japan/Tokyo -->
<div class="pin pin-empty" style="top: 40%; left: 80%;">
<div class="pin-marker"></div>
</div>
</div>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomPanel -->
<div class="fixed bottom-[30px] left-1/2 transform -translate-x-1/2 w-[80%] max-w-[900px] z-50 shadow-[0_4px_12px_rgba(0,0,0,0.3)] rounded-lg">
<div class="bg-white rounded-lg overflow-hidden border border-gray-200">
<div class="bg-[#2A8855] text-white text-center py-[15px] font-bold text-base">
        Arraste os rótulos para o mapa
      </div>
<div class="p-4 md:p-6 flex flex-wrap justify-center gap-3">
<button class="px-4 py-2 border-2 border-[#2A8855] text-gray-800 rounded bg-white hover:bg-green-50 font-medium transition-colors cursor-grab active:cursor-grabbing">
          ABCD Paulista
        </button>
<button class="px-4 py-2 border-2 border-[#2A8855] text-gray-800 rounded bg-white hover:bg-green-50 font-medium transition-colors cursor-grab active:cursor-grabbing">
          Ruhr
        </button>
<button class="px-4 py-2 border-2 border-[#2A8855] text-gray-800 rounded bg-white hover:bg-green-50 font-medium transition-colors cursor-grab active:cursor-grabbing">
          Delta do Rio das Pérolas
        </button>
<button class="px-4 py-2 border-2 border-[#2A8855] text-gray-800 rounded bg-white hover:bg-green-50 font-medium transition-colors cursor-grab active:cursor-grabbing">
          Tóquio
        </button>
<button class="px-4 py-2 border-2 border-[#2A8855] text-gray-800 rounded bg-white hover:bg-green-50 font-medium transition-colors cursor-grab active:cursor-grabbing">
          Lombardia
        </button>
<button class="px-4 py-2 border-2 border-[#2A8855] text-gray-800 rounded bg-white hover:bg-green-50 font-medium transition-colors cursor-grab active:cursor-grabbing">
          Mumbai
        </button>
<button class="px-4 py-2 border-2 border-[#A0A0A0] text-[#A0A0A0] rounded bg-white font-medium line-through cursor-not-allowed" disabled="">
          Vale do Silício
        </button>
</div>
</div>
</div>
<!-- END: BottomPanel -->
</body></html>
