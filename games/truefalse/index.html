<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GeoENEM - Quiz Verdadeiro ou Falso</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #fff1f2; }
    .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .quiz-card { background: white; border-radius: 32px; box-shadow: 0 20px 40px -10px rgba(225, 29, 72, 0.1); border: 2px solid white; }
    .btn-true { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .btn-false { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="glass-nav sticky top-0 z-50 py-4 px-8">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-black tracking-tighter italic text-rose-600">GeoENEM</h1>
      <div class="h-6 w-px bg-slate-200 hidden md:block"></div>
      <span class="text-xs font-bold uppercase tracking-widest text-slate-400 hidden md:block">Desafio de Lógica</span>
    </div>
    <nav class="flex gap-6 items-center">
      <a href="../../aulas/Indice_aulas.html" class="text-sm font-bold text-slate-600 hover:text-rose-600 transition-colors uppercase tracking-widest">Sair</a>
      <div class="bg-rose-100 text-rose-700 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-tighter">Score: <span id="score">0</span></div>
    </nav>
  </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center p-6 gap-8">
  
  <div class="w-full max-w-3xl quiz-card p-12 flex flex-col items-center text-center gap-8 relative overflow-hidden">
    <!-- Decoration -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-rose-50 rounded-full opacity-50"></div>
    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-emerald-50 rounded-full opacity-50"></div>

    <div class="text-[10px] font-black uppercase tracking-[0.4em] text-rose-400" id="question-index">Carregando...</div>
    <h2 class="text-2xl md:text-4xl font-black text-slate-800 leading-tight" id="question-text">O Brasil é o país com a maior área territorial da América do Sul.</h2>
    
    <div class="flex flex-col md:flex-row gap-6 w-full mt-4">
      <button onclick="checkAnswer(true)" class="btn-true flex-1 py-6 rounded-2xl text-white font-black text-xl shadow-xl shadow-emerald-200 hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
        <i class="fa-solid fa-check"></i> VERDADEIRO
      </button>
      <button onclick="checkAnswer(false)" class="btn-false flex-1 py-6 rounded-2xl text-white font-black text-xl shadow-xl shadow-rose-200 hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
        <i class="fa-solid fa-xmark"></i> FALSO
      </button>
    </div>
  </div>

  <div class="bg-white/50 backdrop-blur-md px-6 py-2 rounded-full border border-white text-[10px] font-bold text-slate-400 tracking-widest uppercase">Pense rápido, responda com precisão.</div>

</main>

<script>
  let questions = [];
  let current = 0;
  let score = 0;

  // Load dynamic data
  const urlParams = new URLSearchParams(window.location.search);
  const topic = urlParams.get('topic') || 'base_estrutural_geografia';
  
  // Create script tag to load gamedata.js
  const script = document.createElement('script');
  script.src = '../gamedata.js';
  script.onload = () => {
    console.log('Gamedata loaded for topic:', topic);
    if (window.windowGameData && window.windowGameData[topic] && window.windowGameData[topic].true_false) {
      questions = window.windowGameData[topic].true_false;
      console.log('Questions found:', questions.length);
    } else {
      console.warn('Topic not found in windowGameData, using fallback.');
      questions = [
        { text: "O Brasil é o país com a maior área territorial da América do Sul.", answer: true },
        { text: "A Floresta Amazônica é considerada o maior bioma do mundo em biodiversidade.", answer: true },
        { text: "O sol nasce sempre exatamente no ponto cardeal Leste todos os dias do ano.", answer: false },
        { text: "A linha do Equador atravessa o estado de São Paulo.", answer: false },
        { text: "As rochas ígneas são formadas pelo resfriamento do magma ou lava.", answer: true }
      ];
    }
    updateQuiz();
  };
  script.onerror = () => {
    console.error('Failed to load gamedata.js');
    document.getElementById('question-text').innerText = 'Erro ao carregar dados do jogo.';
  };
  document.head.appendChild(script);

  function checkAnswer(userAnswer) {
    if (!questions || current >= questions.length) return;

    if (userAnswer === questions[current].answer) {
      score += 100;
      showFeedback('Correto!', 'emerald');
    } else {
      showFeedback('Incorreto...', 'rose');
    }

    setTimeout(() => {
      current++;
      if (current < questions.length) {
        updateQuiz();
      } else {
        showEndScreen();
      }
    }, 1000);
  }

  function showFeedback(msg, color) {
    const textEl = document.getElementById('question-text');
    textEl.innerText = msg;
    textEl.className = `text-4xl font-black text-${color}-600`;
    setTimeout(() => {
        textEl.className = "text-2xl md:text-4xl font-black text-slate-800 leading-tight";
    }, 1000);
  }

  function showEndScreen() {
    const card = document.querySelector('.quiz-card');
    card.innerHTML = `
      <div class="py-12 flex flex-col items-center gap-6">
        <div class="w-24 h-24 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center text-5xl">
          <i class="fa-solid fa-trophy"></i>
        </div>
        <h2 class="text-3xl font-black text-slate-800">Desafio Concluído!</h2>
        <p class="text-slate-500 font-medium">Você atingiu <span class="text-rose-600 font-bold">${score}</span> pontos.</p>
        <button onclick="location.reload()" class="bg-rose-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-rose-700 transition-all uppercase tracking-widest text-sm">Tentar Novamente</button>
      </div>
    `;
  }

  function updateQuiz() {
    if (!questions || !questions[current]) return;
    document.getElementById('question-text').innerText = questions[current].text;
    document.getElementById('question-index').innerText = `Questão ${current + 1} de ${questions.length}`;
    document.getElementById('score').innerText = score;
  }
</script>

</body>
</html>
