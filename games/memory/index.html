<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GeoENEM - Jogo da Memória</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <script src="../gamedata.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    
    .memory-card { width: 100%; aspect-ratio: 1/1.2; perspective: 1000px; cursor: pointer; }
    .memory-card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
    .memory-card.flipped .memory-card-inner { transform: rotateY(180deg); }
    
    .card-face { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 24px; display: flex; align-items: center; justify-content: center; padding: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 2px solid white; text-align: center; }
    
    .card-back { background: linear-gradient(135deg, #059669 0%, #10b981 100%); color: white; }
    .card-front { background: white; color: #065f46; transform: rotateY(180deg); border: 2px solid #10b981; }
    
    .text-content { font-size: 0.85rem; font-weight: 700; line-height: 1.2; word-break: break-word; }
    .memory-card.matched { pointer-events: none; opacity: 0.6; filter: grayscale(1); }
    @media (max-width: 640px) { .text-content { font-size: 0.7rem; } }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="glass-nav sticky top-0 z-50 py-4 px-8">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-black tracking-tighter italic text-emerald-600">GeoENEM</h1>
      <div class="h-6 w-px bg-slate-200 hidden md:block"></div>
      <span class="text-xs font-bold uppercase tracking-widest text-slate-400 hidden md:block">Eco Memory Challenge</span>
    </div>
    <nav class="flex gap-6 items-center">
      <a href="../../aulas/Indice_aulas.html" class="text-sm font-bold text-slate-600 hover:text-emerald-600 transition-colors uppercase tracking-widest">Sair</a>
      <div class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-tighter" id="score">Pares: 0 / 6</div>
    </nav>
  </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center p-6 gap-8">
  <div class="text-center">
    <h2 class="text-3xl font-black text-slate-900 mb-2 uppercase tracking-tight">Associação de Conceitos</h2>
    <p class="text-slate-500 text-sm font-medium">Ligue o <span class="text-emerald-600 font-bold">Termo</span> à sua <span class="text-emerald-600 font-bold">Explicação</span> correta.</p>
  </div>

  <div class="grid grid-cols-3 md:grid-cols-4 gap-4 w-full max-w-3xl px-4" id="game-grid">
    <!-- Cards will be generated by JS -->
  </div>

  <button onclick="resetGame()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3 px-8 rounded-2xl shadow-lg shadow-emerald-200 transition-all uppercase tracking-widest text-xs">Reiniciar Jogo</button>
</main>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const topicReq = urlParams.get('topic') || 'base_estrutural_geografia';
  
  let pairs = [];
  if (window.windowGameData && windowGameData[topicReq] && windowGameData[topicReq].memory) {
    pairs = windowGameData[topicReq].memory;
  } else {
    // Fallback if data not found
    pairs = [
      {term: "Paisagem", def: "Domínio do visível."},
      {term: "Espaço", def: "Ação e Objetos."},
      {term: "Lugar", def: "Vínculo afetivo."},
      {term: "Território", def: "Poder e Divisa."},
      {term: "Região", def: "Critério de Divisão."},
      {term: "Mapa", def: "Plano do Espaço."}
    ];
  }

  let cardData = [];
  pairs.slice(0, 6).forEach((p, i) => {
    cardData.push({ text: p.term, pairId: i });
    cardData.push({ text: p.def, pairId: i });
  });

  let flippedCards = [];
  let matchedPairs = 0;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function createCard(data, index) {
    const card = document.createElement('div');
    card.className = 'memory-card';
    card.dataset.index = index;
    card.innerHTML = `
      <div class="memory-card-inner" onclick="flipCard(this, ${data.pairId}, ${index})">
        <div class="card-face card-back">
          <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl font-black italic">?</div>
        </div>
        <div class="card-face card-front">
          <span class="text-content">${data.text}</span>
        </div>
      </div>
    `;
    return card;
  }

  function flipCard(inner, pairId, index) {
    const card = inner.parentElement;
    if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
      card.classList.add('flipped');
      flippedCards.push({ pairId, card });

      if (flippedCards.length === 2) {
        checkMatch();
      }
    }
  }

  function checkMatch() {
    const [card1, card2] = flippedCards;
    if (card1.pairId === card2.pairId) {
      setTimeout(() => {
        card1.card.classList.add('matched');
        card2.card.classList.add('matched');
        matchedPairs++;
        document.getElementById('score').innerText = `Pares: ${matchedPairs} / 6`;
        flippedCards = [];
        if (matchedPairs === 6) {
          showWinner();
        }
      }, 600);
    } else {
      setTimeout(() => {
        card1.card.classList.remove('flipped');
        card2.card.classList.remove('flipped');
        flippedCards = [];
      }, 1200);
    }
  }

  function showWinner() {
     const grid = document.getElementById('game-grid');
     setTimeout(() => {
       grid.parentElement.innerHTML = `
         <div class="flex flex-col items-center gap-6 animate-bounce">
            <div class="text-8xl">🏆</div>
            <h2 class="text-4xl font-black text-emerald-900 uppercase">Geógrafo Mestre!</h2>
            <p class="text-emerald-700 font-bold">Você dominou todos os conceitos desta aula.</p>
            <button onclick="location.reload()" class="bg-emerald-600 text-white px-10 py-4 rounded-3xl font-black shadow-2xl hover:bg-emerald-500 transition-all uppercase tracking-widest">Jogar Novamente</button>
         </div>
       `;
     }, 600);
  }

  function resetGame() {
    matchedPairs = 0;
    flippedCards = [];
    document.getElementById('score').innerText = `Pares: 0 / 6`;
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    shuffle(cardData).forEach((data, index) => {
      grid.appendChild(createCard(data, index));
    });
  }

  resetGame();
</script>

</body>
</html>
